<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicação · Blog Educacional</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><span class="logo">B</span> Blog Educacional</a>
      <nav class="nav">
        <a href="index.html">Início</a>
        <a href="categories.html">Categorias</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container" x-data="postPage()" x-init="load()" x-cloak>
    <a href="index.html" class="back-link">← Voltar para o início</a>

    <div class="state" x-show="loading">
      <div class="spinner"></div>
      Carregando publicação…
    </div>

    <div class="alert error" x-show="error" x-text="error"></div>

    <article class="article" x-show="!loading && post">
      <template x-if="post && post.image_url">
        <img class="cover" :src="post?.image_url" :alt="post?.title" />
      </template>
      <div class="article-body">
        <div class="tags" x-show="post && post.categories && post.categories.length" style="margin-bottom:14px">
          <template x-for="cat in (post?.categories || [])" :key="cat.id">
            <span class="tag" x-text="cat.name"></span>
          </template>
        </div>
        <h1 x-text="post?.title"></h1>
        <div class="article-meta">
          <span x-show="post?.user" x-text="'✍️ ' + (post?.user?.username || '')"></span>
          <span x-text="'🗓️ ' + utils.formatDate(post?.created_at)"></span>
          <span class="badge" :class="post?.status" x-text="post?.status === 'published' ? 'Publicado' : 'Rascunho'"></span>
        </div>
        <div class="content" x-text="post?.content"></div>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    Blog Educacional · Tech Challenge FIAP · Fase 2
  </footer>

  <script src="assets/js/api.js"></script>
  <script>
    function postPage() {
      return {
        post: null,
        loading: true,
        error: '',
        async load() {
          const id = utils.queryParam('id');
          if (!id) {
            this.error = 'Publicação não informada.';
            this.loading = false;
            return;
          }
          try {
            this.post = await api.getPost(id);
            if (this.post?.title) document.title = `${this.post.title} · Blog Educacional`;
          } catch (e) {
            this.error = e.message;
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
  <script defer src="assets/vendor/alpine.min.js"></script>
</body>
</html>
