server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Servição dos arquivos estáticos do front-end.
    location / {
        try_files $uri $uri/ =404;
    }

    # (Opcional) Proxy reverso para a API — evita depender de CORS.
    # Para usar, defina no HTML: window.API_BASE = '/api'
    # location /api/ {
    #     proxy_pass http://backend:3001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
