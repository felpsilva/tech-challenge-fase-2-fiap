services:
  neon-init:
    image: postgres:16-alpine
    container_name: blog-neon-init
    restart: "no"
    env_file:
      - ./backend/.env
    volumes:
      - ./db/init.sql:/init.sql:ro
    command: >
      sh -c "psql \"$$DATABASE_URL\" -v ON_ERROR_STOP=1 -f /init.sql"

  backend:
    build: ./backend
    container_name: blog-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      neon-init:
        condition: service_completed_successfully
